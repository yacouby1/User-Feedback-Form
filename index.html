<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Feedback Form</title>
</head>
<body>
    <h1>User Feedback Form</h1>

    <form id="inputForm">
        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="Write your name here" required>

        <br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Type your email here" required>
            <br><br>

        <label for="comments">Comments:</label>
        <textarea id="comments" placeholder="Write your feedback here"></textarea>

        <br><br>

        <button type="submit">Submit</button>
    </form>

    <div id="feedback-display"></div>

    <script src="cp_1.js"></script>
</body>
</html>
